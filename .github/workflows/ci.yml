name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: assay
          POSTGRES_PASSWORD: assay
          POSTGRES_DB: assay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests
      - name: Mypy (type check)
        run: mypy src
      - name: Pytest (unit + smoke)
        env:
          DATABASE_URL: postgresql+asyncpg://assay:assay@localhost:5432/assay
        run: pytest tests/domain tests/test_smoke.py --no-cov

      - name: Pytest (integration)
        env:
          DATABASE_URL: postgresql+asyncpg://assay:assay@localhost:5432/assay
        continue-on-error: true
        timeout-minutes: 5
        run: pytest tests/adapters --no-cov

  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts
          forge install foundry-rs/forge-std
      - name: Build
        run: forge build --sizes
      - name: Test
        run: FOUNDRY_PROFILE=ci forge test -vv
      - name: Format check
        run: forge fmt --check

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
