services:
  postgres:
    image: postgres:16-alpine
    container_name: assay-postgres
    environment:
      POSTGRES_USER: assay
      POSTGRES_PASSWORD: assay
      POSTGRES_DB: assay
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assay -d assay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assay-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://assay:assay@postgres:5432/assay
      LOG_LEVEL: INFO
      JWT_SECRET: dev-only-secret-replace-in-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_SECONDS: 3600
    ports:
      - "8000:8000"
    profiles:
      - full

volumes:
  postgres-data:
